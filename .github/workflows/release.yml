name: Release Source
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: 🚀 Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🎉 Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
